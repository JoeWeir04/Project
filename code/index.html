<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>UMA-8 Angle</title>
  <style>
    body {
      background: #f3f3f3;
      color: #000000;
      font-family: Arial, sans-serif;
      font-size: 20px;
      font-weight: 550;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100vh;
      margin: 0;
    }
    canvas {
      background: #ffffff;
      border: 0px solid #ffffff;
      border-radius: 50%;
    }
    .info {
      margin-top: 10px;
      text-align: center;
    }
  </style>
</head>
<body>
  <canvas id="compass" width="300" height="300"></canvas>
  <div class="info">
    <div>VAD: <span id="vad">-</span></div>
    <div>Angle: <span id="angle">-</span>°</div>
    <div>Class: <span id="class">Waiting</span></div>
    <div>Transcript: <span id="transcript"></span></div>
  </div>

  <script>
    const canvas = document.getElementById('compass');
    const ctx = canvas.getContext('2d');
    const w = canvas.width, h = canvas.height;
    const cx = w / 2, cy = h / 2;
    const radius = 120;

    const vadEl = document.getElementById('vad');
    const angleEl = document.getElementById('angle');
    const classEl = document.getElementById('class');
    const transcriptEl = document.getElementById('transcript');

    // Draw simple circle and dot
    function draw(angleDeg) {
      ctx.clearRect(0, 0, w, h);

      // Outer circle
      ctx.strokeStyle = '#888';
      ctx.lineWidth = 5;
      ctx.beginPath();
      ctx.arc(cx, cy, radius, 0, Math.PI * 2);
      ctx.stroke();

      // Dot at angle
      const rad = (angleDeg - 90) * Math.PI / 180;
      const dotX = cx + radius * Math.cos(rad);
      const dotY = cy + radius * Math.sin(rad);

      ctx.fillStyle = '#25ff78';
      ctx.beginPath();
      ctx.arc(dotX, dotY, 10, 0, Math.PI * 2);
      ctx.fill();
    }

    // Connect to WebSocket
    const ws = new WebSocket("ws://localhost:8765");

    ws.onmessage = (evt) => {
      const data = JSON.parse(evt.data);

      const angle = Number(data.angle || 0);
      draw(angle);

      vadEl.textContent = data.vad || '-';
      angleEl.textContent = angle;
      classEl.textContent = data.classification || 'Waiting';
      transcriptEl.textContent = data.transcript || '';
    };

    draw(0); // initial
  </script>
</body>
</html>
